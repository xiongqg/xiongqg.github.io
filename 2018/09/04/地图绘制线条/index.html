        <p>1、轨迹回放：线条绘制与点到点动画</p>
<figure class="highlight objectivec"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">//百度地图线条绘制：</span></span><br><span class="line">[BMKPolyline setPolylineWithCoordinates:coor count:count];</span><br><span class="line"><span class="comment">//动画：</span></span><br><span class="line">[<span class="built_in">UIView</span> animateWithDuration:node.distance/<span class="number">30</span>/timeFloat animations:^&#123;</span><br><span class="line">    currentIndex++;</span><br><span class="line">    BMKSportNode *node = [sportNodes objectAtIndex:currentIndex ];</span><br><span class="line">    BMKPointAnnotation.coordinate = node.coordinate;</span><br><span class="line">&#125; completion:^(<span class="built_in">BOOL</span> finished) &#123;</span><br><span class="line">    <span class="comment">//循环</span></span><br><span class="line">&#125;];</span><br></pre></td></tr></table></figure>
<a id="more"></a>
<figure class="highlight objectivec"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">//google地图绘制线条：</span></span><br><span class="line">GMSMutablePath *path = [GMSMutablePath path];</span><br><span class="line">GMSPolyline.path=path;</span><br><span class="line"><span class="comment">//动画：与百度不一样，使用[UIView animateWith] 无动画效果，没深究，然后使用CATransaction动画 加定时器 </span></span><br><span class="line">[<span class="built_in">CATransaction</span> begin];</span><br><span class="line">[<span class="built_in">CATransaction</span> setValue:[<span class="built_in">NSNumber</span> numberWithFloat:node1.distance/<span class="number">30</span>/timeFloat] forKey:kCATransactionAnimationDuration];</span><br><span class="line">gmsMarker.position = node.coordinate;</span><br><span class="line">[<span class="built_in">CATransaction</span> commit];</span><br><span class="line">google地图移除覆盖物线条标注  </span><br><span class="line"><span class="keyword">self</span>.map=<span class="literal">nil</span>；</span><br><span class="line"></span><br><span class="line"><span class="comment">//（google动画无效果原因google大头针继承NSObject，所以使用CATransaction）</span></span><br></pre></td></tr></table></figure>
<p>2、绘制多边形覆盖物（屏幕触摸点绘制多边形）</p>
<figure class="highlight objectivec"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">//百度：</span></span><br><span class="line"><span class="comment">//用户点击屏幕获取经纬度</span></span><br><span class="line">- (<span class="keyword">void</span>)mapView:(BMKMapView *)mapView onClickedMapBlank:(<span class="built_in">CLLocationCoordinate2D</span>)coordinate</span><br><span class="line">备注：需实现</span><br><span class="line">- (BMKAnnotationView *)mapView:(BMKMapView *)mapView viewForAnnotation:(<span class="keyword">id</span> &lt;BMKAnnotation&gt;)annotation此方法</span><br><span class="line"><span class="comment">//点击大头针才回调</span></span><br><span class="line">- (<span class="keyword">void</span>)mapView:(BMKMapView *)mapView didSelectAnnotationView:(BMKAnnotationView *)view</span><br><span class="line"></span><br><span class="line"><span class="comment">//google地图点击返回坐标</span></span><br><span class="line">- (<span class="keyword">void</span>)mapView:(GMSMapView *)mapView didTapAtCoordinate:(<span class="built_in">CLLocationCoordinate2D</span>)coordinate</span><br><span class="line"></span><br><span class="line"><span class="comment">//点击大头针回调</span></span><br><span class="line">- (<span class="keyword">void</span>)mapView:(BMKMapView *)mapView didSelectAnnotationView:(BMKAnnotationView *)view</span><br><span class="line"><span class="comment">//知道相应的代理实现多边形覆盖物就简单了~</span></span><br></pre></td></tr></table></figure>
<p>3、点到点旋转角度 距离计算</p>
<figure class="highlight objectivec"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#pragma mark -- 两点距离角度计算</span></span><br><span class="line">-(<span class="keyword">double</span>)distanceBetweenPoints:(<span class="built_in">CLLocationCoordinate2D</span>)startCoor endCoor:(<span class="built_in">CLLocationCoordinate2D</span>)endCoor</span><br><span class="line">&#123;</span><br><span class="line"><span class="keyword">double</span> sx=startCoor.latitude;</span><br><span class="line"><span class="keyword">double</span> sy=startCoor.longitude;</span><br><span class="line"><span class="keyword">double</span> ex=endCoor.latitude;</span><br><span class="line"><span class="keyword">double</span> ey=endCoor.longitude;</span><br><span class="line"></span><br><span class="line"><span class="keyword">return</span> sqrt(fabs(ex-sx)*fabs(ex-sx)+fabs(ey-sy)*fabs(ey-sy));</span><br><span class="line">&#125;</span><br><span class="line">-(<span class="keyword">double</span>)calcAngleStrtCoor:(<span class="built_in">CLLocationCoordinate2D</span>)startCoor endCoor:(<span class="built_in">CLLocationCoordinate2D</span>)endCoor</span><br><span class="line">&#123;</span><br><span class="line">    <span class="comment">//角度时钟0点计算旋转</span></span><br><span class="line">    <span class="keyword">double</span> sx=startCoor.latitude;   </span><br><span class="line">    <span class="keyword">double</span> sy=startCoor.longitude;</span><br><span class="line">    <span class="keyword">double</span> ex=endCoor.latitude;</span><br><span class="line">    <span class="keyword">double</span> ey=endCoor.longitude;</span><br><span class="line">    <span class="built_in">NSLog</span>(<span class="string">@"start %f,%f"</span>,sx,sy);</span><br><span class="line">    <span class="keyword">double</span> angle1= (atan2((ey-sy), (ex-sx)));</span><br><span class="line">    <span class="keyword">double</span> theta= angle1 *(<span class="number">180</span>/M_PI);</span><br><span class="line">    <span class="built_in">NSLog</span>(<span class="string">@"%f"</span>,theta);</span><br><span class="line">    <span class="keyword">double</span> theta1=<span class="number">90</span>;</span><br><span class="line">    <span class="built_in">NSLog</span>(<span class="string">@"上一个角度%f"</span>,theta1);</span><br><span class="line">    i f (theta&lt;<span class="number">0</span>) &#123;</span><br><span class="line">        theta=<span class="number">360</span>-fabs(theta)-theta1;</span><br><span class="line">    &#125;<span class="keyword">else</span></span><br><span class="line">    &#123;</span><br><span class="line">        theta=theta-theta1;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="built_in">NSLog</span>(<span class="string">@"旋转角度%f"</span>,theta);</span><br><span class="line">    angle1 = M_PI/<span class="number">180</span>*theta;</span><br><span class="line">    <span class="keyword">return</span> angle1;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
<p>4、根据GPS坐标 反地理编码</p>
<figure class="highlight objectivec"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">//百度</span></span><br><span class="line">geoCodeSearch = [[BMKGeoCodeSearch alloc] init];</span><br><span class="line">geoCodeSearch.delegate = <span class="keyword">self</span>;           BMKReverseGeoCodeOption *reverseGeoCodeOption= [[BMKReverseGeoCodeOption alloc] init]; </span><br><span class="line">reverseGeoCodeOption.reverseGeoPoint = coor;</span><br><span class="line">[geoCodeSearch reverseGeoCode:reverseGeoCodeOption];</span><br><span class="line"><span class="comment">//BMKGeoCodeSearchDelegate</span></span><br><span class="line">- (<span class="keyword">void</span>)onGetReverseGeoCodeResult:(BMKGeoCodeSearch *)searcher result:(BMKReverseGeoCodeResult *)result errorCode:(BMKSearchErrorCode)error &#123;</span><br><span class="line">    <span class="comment">//result   位置信息</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">//google</span></span><br><span class="line">GMSReverseGeocodeCallback callBack = ^(GMSReverseGeocodeResponse *response, <span class="built_in">NSError</span> *error) &#123;</span><br><span class="line"><span class="keyword">if</span>(error == <span class="literal">nil</span>) &#123;</span><br><span class="line">    GMSAddress *firstResult = response.firstResult; </span><br><span class="line">    <span class="built_in">NSString</span> *country = firstResult.country; </span><br><span class="line">    <span class="built_in">NSString</span> *administrativeArea = firstResult.administrativeArea; </span><br><span class="line">    <span class="built_in">NSString</span> *locality = firstResult.locality; </span><br><span class="line">    <span class="built_in">NSString</span> *subLocality = firstResult.subLocality;</span><br><span class="line">    <span class="built_in">NSString</span> *thoroughfare = firstResult.thoroughfare;</span><br><span class="line">    &#125; </span><br><span class="line">&#125;;</span><br><span class="line">[[GMSGeocoder geocoder] reverseGeocodeCoordinate:coor completionHandler:callBack];</span><br></pre></td></tr></table></figure>
